<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Artisan Wooden Puzzles</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
</head>

<body
    style="height: 100vh; display: flex; align-items: center; justify-content: center; background: url('assets/images/workshop.jpg'); background-size: cover;">
    <div class="glass-panel p-5 reveal" style="width: 100%; max-width: 450px; background: rgba(255,255,255,0.95);">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center logo mb-3">
                <i class="fas fa-puzzle-piece"></i> Artisan<span>Puzzles</span>
            </a>
            <h3 class="mt-2 text-center">Welcome Back</h3>
            <p class="text-center">Access your collection and orders.</p>
        </div>
        <form>
            <div class="mb-4"><label class="form-label">Email Address</label><input type="email" class="form-control">
            </div>
            <div class="mb-4"><label class="form-label">Password</label><input type="password" class="form-control">
            </div>
            <button class="btn-primary w-100 mb-4">Sign In</button>
            <div class="text-center">
                <span>Don't have an account? <a href="signup.html" class="text-warning">Sign Up</a></span>
            </div>
        </form>
    </div>
    <script src="assets/js/theme-toggle.js"></script>
</body>

</html>
