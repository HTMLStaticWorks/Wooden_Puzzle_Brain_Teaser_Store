<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Artisan Wooden Puzzles</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body
    style="height: 100vh; display: flex; align-items: center; justify-content: center; background: url('assets/images/workshop.jpg'); background-size: cover;">
    <div class="glass-panel p-5 reveal" style="width: 100%; max-width: 450px; background: rgba(255,255,255,0.95);">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center logo mb-3">
                <i class="fas fa-puzzle-piece"></i> Artisan<span>Puzzles</span>
            </a>
            <h3 class="mt-2 text-center">Welcome Back</h3>
            <p class="text-center">Access your collection and orders.</p>
        </div>
        <form>
            <div class="mb-4"><label class="form-label">Email Address</label><input type="email" class="form-control">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control">
            </div>
            <div class="mb-4 d-flex justify-content-between align-items-center">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Remember Me</label>
                </div>
                <a href="#" class="text-warning small" style="text-decoration: none;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn-primary btn-form-match mb-4">Sign In</button>
            <div class="auth-divider">Or login with</div>
            <div class="social-auth-btns mb-4">
                <button type="button" class="btn-social">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91a8.78 8.78 0 0 0 2.69-6.6z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.32-1.58-5.03-3.7H.95v2.32A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.71a5.4 5.4 0 0 1 0-3.42V4.97H.95a9 9 0 0 0 0 8.06l3.02-2.32z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.96 8.96 0 0 0 9 0C5.48 0 2.44 2.02.95 4.97l3.02 2.32C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
                    Google
                </button>
                <button type="button" class="btn-social"><i class="fab fa-apple"></i> Apple</button>
            </div>
            <div class="text-center w-100">
                <span class="d-block">Don't have an account? <a href="signup.html" class="text-warning">Sign Up</a></span>
            </div>
        </form>
    </div>
    <script src="assets/js/theme-toggle.js"></script>
</body>

</html>
