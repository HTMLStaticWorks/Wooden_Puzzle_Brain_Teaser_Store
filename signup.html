<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Artisan Wooden Puzzles</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
</head>

<body
    style="height: 100vh; display: flex; align-items: center; justify-content: center; background: url('assets/images/workshop.jpg'); background-size: cover;">
    <div class="glass-panel p-5 reveal" style="width: 100%; max-width: 450px; background: rgba(255,255,255,0.95);">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center logo mb-3">
                <i class="fas fa-puzzle-piece"></i> Artisan<span>Puzzles</span>
            </a>
            <h3 class="mt-2 text-center">Join the Club</h3>
            <p class="text-center">Get early access to limited releases.</p>
        </div>
        <form>
            <div class="mb-3"><label class="form-label">Full Name</label><input type="text" class="form-control"></div>
            <div class="mb-3"><label class="form-label">Email Address</label><input type="email" class="form-control">
            </div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control">
            </div>
            <div class="form-check mb-4"><input class="form-check-input" type="checkbox"><label
                    class="form-check-label small">I agree to the Terms & Privacy Policy</label></div>
            <button class="btn-primary w-100 mb-3">Create Account</button>
            <div class="text-center">
                <span>Already have an account? <a href="login.html" class="text-warning">Login</a></span>
            </div>
        </form>
    </div>
</body>

</html>
