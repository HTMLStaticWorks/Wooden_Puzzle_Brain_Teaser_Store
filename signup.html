<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Artisan Wooden Puzzles</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <!-- Auth Toggles -->
    <div class="auth-nav-toggles">
        <button class="theme-toggle">
            <i class="fas fa-sun sun"></i>
            <i class="fas fa-moon moon"></i>
        </button>
        <button class="rtl-toggle" title="Toggle RTL Support">RTL</button>
    </div>

    <div class="glass-panel p-5 reveal" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center logo mb-3">
                <i class="fas fa-puzzle-piece"></i> Artisan<span>Puzzles</span>
            </a>
            <h3 class="mt-2 text-center">Join the Club</h3>
            <p class="text-center">Get early access to limited releases.</p>
        </div>
        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="John Doe">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="your@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="password-field-wrapper">
                    <input type="password" class="form-control" id="signupPassword" placeholder="Create password">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('signupPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="password-field-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label small" for="terms">I agree to the Terms & Privacy Policy</label>
            </div>
            <button type="submit" class="btn-primary btn-form-match w-100 py-3 mb-3">Create Account</button>
            <div class="auth-divider">Or sign up with</div>
            <div class="social-auth-btns mb-3">
                <button type="button" class="btn-social">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18">
                        <path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91a8.78 8.78 0 0 0 2.69-6.6z" />
                        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.86-3.05.86-2.34 0-4.32-1.58-5.03-3.7H.95v2.32A9 9 0 0 0 9 18z" />
                        <path fill="#FBBC05" d="M3.97 10.71a5.4 5.4 0 0 1 0-3.42V4.97H.95a9 9 0 0 0 0 8.06l3.02-2.32z" />
                        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.96 8.96 0 0 0 9 0C5.48 0 2.44 2.02.95 4.97l3.02 2.32C4.68 5.16 6.66 3.58 9 3.58z" />
                    </svg>
                    Google
                </button>
                <button type="button" class="btn-social"><i class="fab fa-apple"></i> Apple</button>
            </div>
            <div class="text-center w-100">
                <span class="d-block">Already have an account? <a href="login.html" class="text-warning">Login</a></span>
            </div>
        </form>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
