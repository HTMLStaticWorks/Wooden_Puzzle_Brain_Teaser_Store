<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Artisan Wooden Puzzles</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <link rel="shortcut icon" href="assets/images/favicon.png">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">
    <!-- Auth Toggles -->
    <div class="auth-nav-toggles">
        <button class="theme-toggle">
            <i class="fas fa-sun sun"></i>
            <i class="fas fa-moon moon"></i>
        </button>
        <button class="rtl-toggle" title="Toggle RTL Support">RTL</button>
    </div>

    <div class="glass-panel p-5 reveal" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <a href="index.html" class="d-flex align-items-center justify-content-center logo mb-3">
                <i class="fas fa-puzzle-piece"></i> Artisan<span>Puzzles</span>
            </a>
            <h3 class="mt-2 text-center">Join the Club</h3>
            <p class="text-center">Get early access to limited releases.</p>
        </div>
        <form>
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Full Name">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="your@email.com">
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="password-field-wrapper">
                    <input type="password" class="form-control" id="signupPassword" placeholder="Create password">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('signupPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Confirm Password</label>
                <div class="password-field-wrapper">
                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
                    <button type="button" class="password-toggle-btn" onclick="togglePassword('confirmPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms">
                <label class="form-check-label small" for="terms">I agree to the Terms & Privacy Policy</label>
            </div>
            <button type="submit" class="btn-primary btn-form-match w-100 py-3 mb-4">Create Account</button>
            <div class="text-center w-100">
                <span class="d-block">Already have an account? <a href="login.html"
                        class="text-warning">Login</a></span>
            </div>
        </form>
    </div>

    <script src="assets/js/theme-toggle.js"></script>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
